experiment:
  name: benchmark_ms_window_ws8_o0_lm
  seed: 42

device: auto
cuda_device: 0

data:
  dataset: tiny_shakespeare
  data_dir: data/tiny_shakespeare
  block_size: 256

loader:
  batch_size: 1
  num_workers: 0

model:
  backbone: multiscale_mamba2_window_summary_lm
  d_model: 256
  layer_headdims: [32, 32, 32, 32]
  vocab_size: 65
  multiscale:
    fusion: window_residual_gated
    window_size: 8
    offsets: [0]
    summary_mode: last
    causal_mode: completed
    gate_type: vector
    slow_layer_headdims: [32, 32]
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1

train:
  epochs: 1

logging:
  output_dir: outputs/_benchmark_unused/${experiment.name}
