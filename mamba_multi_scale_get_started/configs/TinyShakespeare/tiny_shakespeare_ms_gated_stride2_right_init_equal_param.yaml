# MS-gated stride-2 + explicit fast/slow "right-ish" init, matched to ~mamba2_depth4 param count
# on TinyShakespeare (vocab 65) and mqar_mamba2_depth4 on MQAR (vocab 1024), within ±5%.
#
# causal_conv1d (Mamba2 path) requires conv channel count
#   conv_dim = expand*d_model + 2*ngroups*d_state  ≡ 0 (mod 8),
# and on many (d_model, headdim) combinations the fused layout also requires aligned strides.
# CUDA smoke (`code/smoke_search_ms_gated_equal_param.py`) picked: d_model=192, headdim=16,
# d_state=120, fast depth 4 / slow 2 (max |Δ| vs baselines smaller than d_state-only tuning at headdim=24).
experiment:
  name: tiny_shakespeare_ms_gated_stride2_right_init_equal_param
  seed: 42

device: auto
cuda_device: 0

data:
  dataset: tiny_shakespeare
  data_dir: data/tiny_shakespeare
  block_size: 256
  train_ratio: 0.9
  sampling: random_windows
  steps_per_epoch: 2000

loader:
  batch_size: 128
  num_workers: 64

model:
  backbone: multiscale_mamba2_lm
  d_model: 192
  layer_headdims: [16, 16, 16, 16]
  vocab_size: 65
  multiscale:
    stride: 2
    fusion: gated
    fast_layer_headdims: [16, 16, 16, 16]
    slow_layer_headdims: [16, 16]
    fast_A_init_range: [0.1, 4.0]
    slow_A_init_range: [4.0, 32.0]
    fast_dt_min: 0.0001
    fast_dt_max: 0.03
    slow_dt_min: 0.003
    slow_dt_max: 0.3
  mamba:
    d_state: 120
    d_conv: 4
    expand: 2
    ngroups: 1

train:
  epochs: 10
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  debug_initial_eval: false
  early_stopping:
    patience: 3
    min_delta: 0.0001

logging:
  output_dir: outputs/TinyShakespeare/${experiment.name}
