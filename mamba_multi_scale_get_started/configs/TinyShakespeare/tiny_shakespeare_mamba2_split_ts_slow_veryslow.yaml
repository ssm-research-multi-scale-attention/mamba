# Mamba2 depth4 with split-head slow + very_slow timescale init (matches MQAR mamba2_split_ts_slow_veryslow).
experiment:
  name: tiny_shakespeare_mamba2_split_ts_slow_veryslow_random_windows
  seed: 42

device: auto
cuda_device: 0

data:
  dataset: tiny_shakespeare
  data_dir: data/tiny_shakespeare
  block_size: 256
  train_ratio: 0.9
  sampling: random_windows
  steps_per_epoch: 2000

loader:
  batch_size: 128
  num_workers: 64

model:
  backbone: mamba2_lm
  d_model: 256
  layer_headdims: [32, 32, 32, 32]
  vocab_size: 65
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
    timescale_init: split_heads
    timescale_splits:
      - name: slow
        fraction: 0.5
        A_init_range: [0.1, 4.0]
        dt_min: 0.0001
        dt_max: 0.03
      - name: very_slow
        fraction: 0.5
        A_init_range: [0.03, 1.0]
        dt_min: 0.00003
        dt_max: 0.01

train:
  epochs: 10
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  debug_initial_eval: false
  early_stopping:
    patience: 3
    min_delta: 0.0001

logging:
  output_dir: outputs/TinyShakespeare/${experiment.name}
