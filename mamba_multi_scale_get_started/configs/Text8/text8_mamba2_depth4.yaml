# Mamba2 depth-4 on Text8 (char LM, BPC). Same recipe as TinyShakespeare mamba2_depth4.
experiment:
  name: text8_mamba2_depth4_placeholder
  seed: 42

device: auto
cuda_device: 0

data:
  dataset: text8
  data_dir: data/text8
  block_size: 256
  train_ratio: 0.9
  sampling: random_windows
  steps_per_epoch: 2000

loader:
  batch_size: 128
  num_workers: 16

model:
  backbone: mamba2_lm
  d_model: 256
  layer_headdims: [32, 32, 32, 32]
  vocab_size: 0
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1

train:
  epochs: 10
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  debug_initial_eval: false
  early_stopping:
    patience: 3
    min_delta: 0.0001

logging:
  output_dir: outputs/Text8/${experiment.name}
