# Text classification experiments (OmegaConf + Lightning).
#
# Swap dataset / Lightning module via data.* and model.lit_class.

experiment:
  name: imdb_mamba2_baseline
  seed: 42

device: auto

data:
  # HuggingFace dataset id passed to datasets.load_dataset
  dataset: imdb
  train_split: train
  eval_split: test
  text_key: text
  label_key: label
  tokenizer: bert-base-uncased
  max_length: 512
  train_subset: null
  eval_subset: null

loader:
  batch_size: 256
  num_workers: 64
  pin_memory: true

model:
  # Dotted path to LightningModule.__init__(self, cfg, **kwargs). Optional kwargs:
  lit_class: mamba_heads_lit.MambaHeadsLitModule
  lit_init: {}
  d_model: 256
  num_classes: 2
  layer_headdims: [32, 32, 32, 32, 32, 32, 32, 32]
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1

train:
  epochs: 3
  optimizer: adamw
  lr: 2.0e-4
  weight_decay: 0.01
  devices: 1
  precision: 32
  # torch.set_float32_matmul_precision: highest | high | medium. null/false to skip.
  float32_matmul_precision: high

logging:
  output_dir: outputs/${experiment.name}
  # At run start, experiment_runner writes resolved_config.yaml here (fully merged & resolved).
  # Plotly HTML (train_loss.html, confusion_matrix.html, interactive_report.html)
  save_plots: true
  # plotly write_html: cdn (default, smaller) | inline (self-contained, better offline)
  plotly_include_js: cdn
  # If true, require lit._last_cm after test when save_plots is on
  require_confusion_matrix: false
  # TensorBoard: events under output_dir / tensorboard_subdir / version_*
  tensorboard: true
  tensorboard_subdir: tensorboard
  # Step interval for train/acc_batch etc.; epoch metrics unaffected
  tensorboard_log_every_n_steps: 50
