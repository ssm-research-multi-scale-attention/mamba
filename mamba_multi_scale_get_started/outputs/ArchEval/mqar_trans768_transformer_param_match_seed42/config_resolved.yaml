experiment:
  name: archeval_mqar_trans768_transformer_param_match_seed42
  seed: 42
device: cuda:0
cuda_device: 0
data:
  dataset: mqar
  input_seq_len: 128
  num_kv_pairs: 16
  vocab_size: 768
  train_examples: 20000
  val_examples: 2000
  test_examples: 2000
  num_passes: 1
  random_non_queries: true
  fixed_examples: true
  power_a: 0.01
  min_query_pos: null
loader:
  batch_size: 128
  num_workers: 0
  pin_memory: false
train:
  epochs: 20
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  early_stopping:
    patience: 4
    min_delta: 0.0001
logging:
  output_dir: outputs/ArchEval/mqar_trans768_transformer_param_match_seed42
model:
  backbone: transformer_lm
  d_model: 232
  vocab_size: 768
  transformer:
    n_layers: 4
    n_heads: 4
    mlp_ratio: 4
    dropout: 0.1
    max_seq_len: 1024
    norm_first: true
