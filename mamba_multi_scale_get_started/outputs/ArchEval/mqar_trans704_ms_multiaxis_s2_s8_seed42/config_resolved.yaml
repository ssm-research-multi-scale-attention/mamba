experiment:
  name: archeval_mqar_trans704_ms_multiaxis_s2_s8_seed42
  seed: 42
device: cuda:0
cuda_device: 0
data:
  dataset: mqar
  input_seq_len: 128
  num_kv_pairs: 16
  vocab_size: 704
  train_examples: 20000
  val_examples: 2000
  test_examples: 2000
  num_passes: 1
  random_non_queries: true
  fixed_examples: true
  power_a: 0.01
  min_query_pos: null
loader:
  batch_size: 128
  num_workers: 0
  pin_memory: false
train:
  epochs: 20
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  early_stopping:
    patience: 4
    min_delta: 0.0001
logging:
  output_dir: outputs/ArchEval/mqar_trans704_ms_multiaxis_s2_s8_seed42
model:
  backbone: multiscale_mamba2_multiaxis_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  vocab_size: 704
  multiscale:
    fusion: residual_gated_sum
    gate_type: vector
    fast_layer_headdims:
    - 32
    - 32
    - 32
    - 32
    branches:
    - name: slow
      stride: 2
      layer_headdims:
      - 32
      - 32
    - name: slow2
      stride: 8
      layer_headdims:
      - 32
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
