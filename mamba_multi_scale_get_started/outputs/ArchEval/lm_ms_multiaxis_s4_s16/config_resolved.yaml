experiment:
  name: archeval_lm_ms_multiaxis_s4_s16
  seed: 42
device: cuda:0
cuda_device: 0
data:
  dataset: tiny_shakespeare
  data_dir: data/tiny_shakespeare
  block_size: 1024
  train_ratio: 0.9
  sampling: random_windows
  steps_per_epoch: 2000
loader:
  batch_size: 128
  num_workers: 0
model:
  backbone: multiscale_mamba2_multiaxis_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  vocab_size: 65
  multiscale:
    fusion: residual_gated_sum
    gate_type: vector
    fast_layer_headdims:
    - 32
    - 32
    - 32
    - 32
    branches:
    - name: slow
      stride: 4
      layer_headdims:
      - 32
      - 32
    - name: slow2
      stride: 16
      layer_headdims:
      - 32
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
train:
  epochs: 10
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  debug_initial_eval: false
  early_stopping:
    patience: 3
    min_delta: 0.0001
logging:
  output_dir: outputs/ArchEval/lm_ms_multiaxis_s4_s16
