experiment:
  name: archeval_lm_ms_window_ws8_o0_o4
  seed: 42
device: cuda:0
cuda_device: 0
data:
  dataset: tiny_shakespeare
  data_dir: data/tiny_shakespeare
  block_size: 1024
  train_ratio: 0.9
  sampling: random_windows
  steps_per_epoch: 2000
loader:
  batch_size: 128
  num_workers: 0
model:
  backbone: multiscale_mamba2_window_summary_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  vocab_size: 65
  multiscale:
    fusion: window_residual_gated
    window_size: 8
    offsets:
    - 0
    - 4
    summary_mode: last
    causal_mode: completed
    gate_type: vector
    slow_layer_headdims:
    - 32
    - 32
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
train:
  epochs: 10
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  debug_initial_eval: false
  early_stopping:
    patience: 3
    min_delta: 0.0001
logging:
  output_dir: outputs/ArchEval/lm_ms_window_ws8_o0_o4
