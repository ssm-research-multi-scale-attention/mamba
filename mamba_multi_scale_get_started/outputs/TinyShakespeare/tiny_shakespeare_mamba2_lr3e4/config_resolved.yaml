experiment:
  name: tiny_shakespeare_mamba2_lr3e4
  seed: 42
device: auto
cuda_device: 1
data:
  dataset: tiny_shakespeare
  data_dir: data/tiny_shakespeare
  block_size: 256
  train_ratio: 0.9
loader:
  batch_size: 128
  num_workers: 64
model:
  backbone: mamba2_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
  vocab_size: 65
train:
  epochs: 10
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  early_stopping:
    patience: 3
    min_delta: 0.0001
logging:
  output_dir: outputs/TinyShakespeare/tiny_shakespeare_mamba2_lr3e4
