experiment:
  name: tiny_shakespeare_mamba2_large_ctx512
  seed: 42
device: auto
cuda_device: 0
data:
  dataset: tiny_shakespeare
  data_dir: data/tiny_shakespeare
  block_size: 512
  train_ratio: 0.9
  sampling: random_windows
  steps_per_epoch: 10000
loader:
  batch_size: 128
  num_workers: 64
model:
  backbone: mamba2_lm
  d_model: 512
  layer_headdims:
  - 64
  - 64
  - 64
  - 64
  - 64
  - 64
  - 64
  - 64
  vocab_size: 65
  mamba:
    d_state: 64
    d_conv: 4
    expand: 2
    ngroups: 1
train:
  epochs: 20
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  debug_initial_eval: false
  early_stopping:
    patience: 3
    min_delta: 0.0001
logging:
  output_dir: outputs/TinyShakespeare/tiny_shakespeare_mamba2_large_ctx512
