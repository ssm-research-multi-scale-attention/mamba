experiment:
  name: tiny_shakespeare_ms_film_stride2_random_windows
  seed: 42
device: auto
cuda_device: 0
data:
  dataset: tiny_shakespeare
  data_dir: data/tiny_shakespeare
  block_size: 128
  train_ratio: 0.9
  sampling: random_windows
  steps_per_epoch: 10
loader:
  batch_size: 8
  num_workers: 0
model:
  backbone: multiscale_mamba2_film_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  vocab_size: 65
  multiscale:
    stride: 2
    fusion: film
    film_init_zero: true
    fast_layer_headdims:
    - 32
    - 32
    - 32
    - 32
    slow_layer_headdims:
    - 32
    - 32
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
train:
  epochs: 1
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  debug_initial_eval: false
  early_stopping:
    patience: 3
    min_delta: 0.0001
logging:
  output_dir: outputs/TinyShakespeare/tiny_shakespeare_ms_film_stride2_random_windows
