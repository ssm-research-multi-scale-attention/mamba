experiment:
  name: tiny_shakespeare_multiscale_mamba2_attention
  seed: 42
device: auto
cuda_device: 0
data:
  dataset: tiny_shakespeare
  data_dir: data/tiny_shakespeare
  block_size: 256
  train_ratio: 0.9
loader:
  batch_size: 128
  num_workers: 64
model:
  backbone: multiscale_mamba2_attention_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  multiscale:
    stride: 4
    fusion: residual
    attention_heads: 4
    dropout: 0.1
    fast_layer_headdims:
    - 32
    - 32
    - 32
    - 32
    - 32
    - 32
    - 32
    - 32
    slow_layer_headdims:
    - 32
    - 32
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
  vocab_size: 65
train:
  epochs: 10
  lr: 0.001
  weight_decay: 0.01
  grad_clip: 1.0
  early_stopping:
    patience: 3
    min_delta: 0.0001
logging:
  output_dir: outputs/TinyShakespeare/tiny_shakespeare_multiscale_mamba2_attention
