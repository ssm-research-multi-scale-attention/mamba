experiment:
  name: debug_mqar_ms_multiaxis_s4_s16
  seed: 42
device: auto
cuda_device: 0
data:
  dataset: mqar
  input_seq_len: 128
  num_kv_pairs: 16
  vocab_size: 1024
  train_examples: 256
  val_examples: 128
  test_examples: 128
  num_passes: 1
  random_non_queries: true
  fixed_examples: true
  power_a: 0.01
loader:
  batch_size: 16
  num_workers: 0
  pin_memory: false
train:
  epochs: 1
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  early_stopping:
    patience: 4
    min_delta: 0.0001
logging:
  output_dir: outputs/debug_mqar_ms_multiaxis_s4_s16
model:
  backbone: multiscale_mamba2_multiaxis_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  vocab_size: 1024
  multiscale:
    fusion: residual_gated_sum
    gate_type: vector
    fast_layer_headdims:
    - 32
    - 32
    - 32
    - 32
    branches:
    - name: slow
      stride: 4
      layer_headdims:
      - 32
      - 32
    - name: slow2
      stride: 16
      layer_headdims:
      - 32
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
