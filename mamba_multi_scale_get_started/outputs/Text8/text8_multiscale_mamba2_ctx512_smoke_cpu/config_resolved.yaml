experiment:
  name: text8_multiscale_mamba2_ctx512
  seed: 42
device: cpu
cuda_device: 0
data:
  dataset: text8
  data_dir: data/text8
  block_size: 512
  train_ratio: 0.9
  sampling: random_windows
  steps_per_epoch: 1
loader:
  batch_size: 2
  num_workers: 0
model:
  backbone: multiscale_mamba2_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  vocab_size: 27
  multiscale:
    stride: 4
    fusion: gated
    fast_layer_headdims:
    - 32
    - 32
    - 32
    - 32
    slow_layer_headdims:
    - 32
    - 32
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
train:
  epochs: 1
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  debug_initial_eval: false
  early_stopping:
    patience: 3
    min_delta: 0.0001
logging:
  output_dir: outputs/Text8/text8_multiscale_mamba2_ctx512_smoke_cpu
