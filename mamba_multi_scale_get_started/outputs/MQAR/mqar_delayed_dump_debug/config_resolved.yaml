experiment:
  name: mqar_delayed_dump_debug
  seed: 42
device: auto
cuda_device: 0
data:
  dataset: mqar
  input_seq_len: 256
  num_kv_pairs: 16
  vocab_size: 512
  train_examples: 20000
  val_examples: 2000
  test_examples: 2000
  num_passes: 1
  random_non_queries: true
  fixed_examples: true
  power_a: 0.01
  min_query_pos: 128
  dump_samples: true
  dump_n_samples: 5
loader:
  batch_size: 128
  num_workers: 0
  pin_memory: false
train:
  epochs: 1
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  early_stopping:
    patience: 4
    min_delta: 0.0001
logging:
  output_dir: outputs/MQAR/mqar_delayed_dump_debug
model:
  backbone: mamba2_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  vocab_size: 512
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
