experiment:
  name: mqar_ms_gated_stride2_len128
  seed: 42
device: cuda:0
cuda_device: 0
data:
  dataset: mqar
  input_seq_len: 128
  num_kv_pairs: 16
  vocab_size: 1024
  train_examples: 5000
  val_examples: 1000
  test_examples: 1000
  num_passes: 1
  random_non_queries: true
  fixed_examples: true
  power_a: 0.01
loader:
  batch_size: 128
  num_workers: 0
train:
  epochs: 10
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  early_stopping:
    patience: 3
    min_delta: 0.0001
logging:
  output_dir: outputs/MQAR/mqar_ms_gated_stride2_len128
model:
  backbone: multiscale_mamba2_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  vocab_size: 1024
  multiscale:
    stride: 2
    fusion: gated
    fast_layer_headdims:
    - 32
    - 32
    - 32
    - 32
    slow_layer_headdims:
    - 32
    - 32
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
