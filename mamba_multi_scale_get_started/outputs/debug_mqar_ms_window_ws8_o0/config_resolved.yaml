experiment:
  name: debug_mqar_ms_window_ws8_o0
  seed: 42
device: auto
cuda_device: 0
data:
  dataset: mqar
  input_seq_len: 128
  num_kv_pairs: 16
  vocab_size: 1024
  train_examples: 256
  val_examples: 128
  test_examples: 128
  num_passes: 1
  random_non_queries: true
  fixed_examples: true
  power_a: 0.01
loader:
  batch_size: 16
  num_workers: 0
  pin_memory: false
train:
  epochs: 1
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  early_stopping:
    patience: 4
    min_delta: 0.0001
logging:
  output_dir: outputs/debug_mqar_ms_window_ws8_o0
model:
  backbone: multiscale_mamba2_window_summary_lm
  d_model: 256
  layer_headdims:
  - 32
  - 32
  - 32
  - 32
  vocab_size: 1024
  multiscale:
    fusion: window_residual_gated
    window_size: 8
    offsets:
    - 0
    summary_mode: mean
    gate_type: vector
    slow_layer_headdims:
    - 32
    - 32
  mamba:
    d_state: 32
    d_conv: 4
    expand: 2
    ngroups: 1
